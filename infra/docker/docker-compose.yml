services:
  db:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: dogphoto
      POSTGRES_USER: dogphoto
      POSTGRES_PASSWORD: dogphoto_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dogphoto"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
      target: dev
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=dogphoto;Username=dogphoto;Password=dogphoto_dev"
      Azure__BlobStorage__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1"
    volumes:
      - ../../src/backend:/app/src

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
      target: dev
    ports:
      - "4321:4321"
    depends_on:
      - api
    environment:
      PUBLIC_API_URL: http://api:8080
    volumes:
      - ../../src/frontend:/app
      - frontend_node_modules:/app/node_modules

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
  azurite_data:
  frontend_node_modules:
